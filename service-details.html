      function setNav(labels) {
        navHrefs.forEach((href, i) => {
          const a = document.querySelector(`#navmenu a[href="${href}"]`);
          if (!a || !labels[i]) return;
          const icon = a.querySelector('i');
          a.innerHTML = '';
          if (icon) a.appendChild(icon);
          a.append(' ' + labels[i]);
        });
      }

      function renderServiceList(services, selectedId) {
        const list = document.getElementById('service-list-links');
        list.innerHTML = '';

        services.forEach((svc, idx) => {
          const a = document.createElement('a');
          a.href = `#${svc.id}`;
          a.textContent = svc.navLabel;
          if ((selectedId && svc.id === selectedId) || (!selectedId && idx === 0)) {
            a.classList.add('active');
          }
          a.addEventListener('click', (e) => {
            e.preventDefault();
            history.replaceState(null, '', `#${svc.id}`);
            renderServiceDetail(svc.id);
          });
          list.appendChild(a);
        });
      }

        document.getElementById('left-service-title').textContent = selected.leftTitle;
        document.getElementById('left-service-desc').textContent = selected.leftDesc;
        document.getElementById('detail-title').textContent = selected.title;
        document.getElementById('detail-lead').textContent = selected.lead;
        document.getElementById('detail-p1').textContent = selected.p1;
        document.getElementById('detail-p2').textContent = selected.p2;

        const ul = document.getElementById('detail-bullets');
        ul.innerHTML = '';
        selected.bullets.forEach((b) => {
          const li = document.createElement('li');
          li.innerHTML = '<i class="bi bi-check-circle"></i><span></span>';
          li.querySelector('span').textContent = b;
          ul.appendChild(li);
        });

        renderServiceList(services, selected.id);
      }

      function applyLang(lang) {
        currentLang = i18n[lang] ? lang : 'en';
        const t = i18n[currentLang];

        document.documentElement.lang = currentLang;
        document.title = t.pageTitle;
        setNav(t.nav);

        document.getElementById('page-title-text').textContent = t.pageHeader;
        document.getElementById('crumb-home').textContent = t.crumbHome;
        document.getElementById('crumb-current').textContent = t.crumbCurrent;
        document.getElementById('footer-rights').textContent = t.footerRights;

        const hash = (window.location.hash || '').replace('#', '');
        renderServiceDetail(hash);

        document.querySelectorAll('.lang-btn').forEach((btn) => {
          btn.classList.toggle('active', btn.dataset.lang === currentLang);
        });

        localStorage.setItem('site_lang', currentLang);
      }

      window.addEventListener('hashchange', () => {
        const hash = (window.location.hash || '').replace('#', '');
        if (hash) renderServiceDetail(hash);
      });

      document.querySelectorAll('.lang-btn').forEach((btn) => {
        btn.addEventListener('click', () => applyLang(btn.dataset.lang));
      });

      applyLang(localStorage.getItem('site_lang') || 'en');
    })();
  </script>

</body>

</html>
